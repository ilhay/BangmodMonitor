services:

  mariadb:
    image: mariadb:11-noble
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: bangmod
      MARIADB_USER: bangmod
      MARIADB_PASSWORD: bangmod
    volumes:
      - maria_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.6-alpine
    environment:
      CLICKHOUSE_DB: bangmod
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - ch_data:/var/lib/clickhouse
    ports:
      - "9000:9000"
      - "8123:8123"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      HTTP_PORT: "8080"
      GRPC_PORT: "9090"
      MARIADB_DSN: "bangmod:bangmod@tcp(mariadb:3306)/bangmod?parseTime=true&charset=utf8mb4"
      CLICKHOUSE_DSN: "clickhouse://default:@clickhouse:9000/bangmod"
      REDIS_ADDR: "redis:6379"
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      mariadb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  alerter:
    build:
      context: ../alerter
      dockerfile: Dockerfile
    environment:
      MARIADB_DSN: "bangmod:bangmod@tcp(mariadb:3306)/bangmod?parseTime=true&charset=utf8mb4"
      CLICKHOUSE_DSN: "clickhouse://default:@clickhouse:9000/bangmod"
      EVAL_INTERVAL: "60"
    depends_on:
      mariadb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # Probe nodes — deploy one container per region in production
  probe-th:
    build:
      context: ../probe
      dockerfile: Dockerfile
    environment:
      API_URL: "http://api:8080"
      NODE_SECRET: "probe-secret-change-me"
      PROBE_REGION: "th"
      PROBE_INTERVAL: "60"
      PROBE_TARGETS: "https://google.com,https://cloudflare.com"
      PROBE_TCP_TARGETS: "google.com:443,cloudflare.com:443"
    depends_on:
      - api

  probe-sg:
    build:
      context: ../probe
      dockerfile: Dockerfile
    environment:
      API_URL: "http://api:8080"
      NODE_SECRET: "probe-secret-change-me"
      PROBE_REGION: "sg"
      PROBE_INTERVAL: "60"
      PROBE_TARGETS: "https://google.com,https://cloudflare.com"
      PROBE_TCP_TARGETS: "google.com:443,cloudflare.com:443"
    depends_on:
      - api

  probe-hk:
    build:
      context: ../probe
      dockerfile: Dockerfile
    environment:
      API_URL: "http://api:8080"
      NODE_SECRET: "probe-secret-change-me"
      PROBE_REGION: "hk"
      PROBE_INTERVAL: "60"
      PROBE_TARGETS: "https://google.com,https://cloudflare.com"
      PROBE_TCP_TARGETS: "google.com:443,cloudflare.com:443"
    depends_on:
      - api

volumes:
  maria_data:
  ch_data:
  redis_data:
